<div class="flex justify-center items-center h-full">
  <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-2xl">
    <h2 class="text-center text-xl font-semibold mb-6">List Skills</h2>
    <table class="w-full border text-left text-sm">
      <thead class="bg-gray-100 text-gray-600">
        <tr>
          <th class="py-2 px-3">Name</th>
          <th class="py-2 px-3">Logo</th>
          <th class="py-2 px-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (skill of skills; track skill.name) {
          <tr class="border-t hover:bg-gray-50">
            <td class="py-2 px-3">{{ skill.name }}</td>
            <td class="py-2 px-3">
              <img [src]="skill.logo" alt="{{ skill.name }}" class="h-6" />
            </td>
            <td class="py-2 px-3">
              <!-- Add action icons/buttons here -->
              <button class="text-red-500 hover:underline text-xs">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
