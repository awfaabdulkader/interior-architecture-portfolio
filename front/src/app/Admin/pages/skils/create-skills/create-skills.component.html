<div class="flex justify-center items-center h-full bg-gray-100 p-4">
  <div class="bg-white p-8 rounded-xl border-2  w-full max-w-lg">
    <form
      [formGroup]="skillForm"
      (ngSubmit)="onSubmit()"
      class="space-y-6"
    >
      <!-- Title -->
      <h2 class="text-center text-lg font-medium text-gray-800 mb-8">
        Add Skills
      </h2>

      <div class="grid grid-cols-2 gap-6">
        <!-- Name Input -->
        <div>
          <label class="block text-sm text-gray-600 mb-2">Name</label>
          <input
            type="text"
            formControlName="name"
            placeholder="Archicad"
            class="w-full px-3 py-3 bg-gray-50 border-0 rounded-lg focus:outline-none focus:bg-white focus:ring-1 focus:ring-gray-300 text-sm"
          />
        </div>

        <!-- Logo Upload Section -->
        <div>
          <label class="block text-sm text-gray-600 mb-2">Logo</label>
          <div
            class="border-2 border-dashed border-gray-300 rounded-lg p-6 flex flex-col items-center justify-center cursor-pointer bg-gray-50 h-24"
            (click)="openFileInput()"
          >
            <ng-container *ngIf="!previewUrl">
              <p class="text-gray-400 text-xs text-center">Select image or Drop it</p>
            </ng-container>
            <img *ngIf="previewUrl" [src]="previewUrl" class="h-12" />
          </div>
          <input
            type="file"
            #logoInputRef
            class="hidden"
            (change)="onLogoSelected($event)"
            accept="image/*"
          />
        </div>
      </div>

      <!-- Submit Button -->
      <div class="flex justify-center pt-4">
        <button
          type="submit"
          class="bg-teal-600 text-white px-12 py-2 rounded-full hover:bg-teal-700 transition text-sm font-medium"
        >
          Add
        </button>
      </div>
    </form>
  </div>
</div>
